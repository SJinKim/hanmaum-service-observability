apiVersion: 1

groups:
  - orgId: 1
    name: DN Server
    folder: Observability Alerts
    interval: 1m
    rules:
      - uid: dn-server-unavailable
        title: DN Server nicht erreichbar
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: up{job="spring-services", service="dn-server"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A < 1
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: dn-server-overview
        panelId: 1
        noDataState: Alerting
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: "DN Server {{ $labels.environment }} ist nicht erreichbar"
          description: "Prometheus kann {{ $labels.instance }} seit mindestens 2 Minuten nicht erfolgreich abfragen."
        labels:
          severity: critical
          service: dn-server
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: dn-server-high-5xx
        title: DN Server erhöhte HTTP-5xx-Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                100 * sum by (environment, service)
                (rate(http_server_requests_seconds_count{job="spring-services", service="dn-server", status=~"5.."}[5m]))
                / clamp_min(sum by (environment, service)
                (rate(http_server_requests_seconds_count{job="spring-services", service="dn-server"}[5m])), 0.001)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                sum by (environment, service)
                (increase(http_server_requests_seconds_count{job="spring-services", service="dn-server", status=~"5.."}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: B
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: ($A > 5) && ($B >= 5)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: math
        dashboardUid: dn-server-overview
        panelId: 3
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        annotations:
          summary: "Erhöhte 5xx-Rate im DN Server {{ $labels.environment }}"
          description: "Die HTTP-5xx-Rate liegt seit 5 Minuten über 5 % und es gab mindestens 5 Serverfehler im letzten 5-Minuten-Fenster."
        labels:
          severity: critical
          service: dn-server
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
