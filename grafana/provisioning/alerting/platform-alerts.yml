apiVersion: 1

groups:
  - orgId: 1
    name: Platform
    folder: Observability Alerts
    interval: 1m
    rules:
      - uid: platform-scrape-target-down
        title: Plattform-Metrics-Target nicht erreichbar
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: up{job=~"node|containers"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A < 1
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: platform-overview
        panelId: 7
        noDataState: Alerting
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: "Metrics-Target {{ $labels.job }} ist nicht erreichbar"
          description: "Prometheus kann {{ $labels.instance }} seit mindestens 2 Minuten nicht erfolgreich abfragen. Host- oder Container-Monitoring kann unvollständig sein."
        labels:
          severity: critical
          service: observability
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: host-disk-space-warning
        title: Host-Festplatte über 85 Prozent
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                100 * (1 - node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A > 85
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: platform-overview
        panelId: 4
        noDataState: OK
        execErrState: Error
        for: 10m
        keepFiringFor: 10m
        annotations:
          summary: Host-Festplatte ist zu mehr als 85 Prozent belegt
          description: "Die Root-Festplatte auf {{ $labels.instance }} ist seit mindestens 10 Minuten zu mehr als 85 % belegt."
        labels:
          severity: warning
          service: hetzner-host
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: host-disk-space-critical
        title: Host-Festplatte über 95 Prozent
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                100 * (1 - node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A > 95
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: platform-overview
        panelId: 4
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 10m
        annotations:
          summary: Host-Festplatte ist kritisch voll
          description: "Die Root-Festplatte auf {{ $labels.instance }} ist seit mindestens 5 Minuten zu mehr als 95 % belegt. Sofort Speicher freigeben."
        labels:
          severity: critical
          service: hetzner-host
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 10s
          group_interval: 5m
          repeat_interval: 1h

      - uid: host-memory-high
        title: Host-RAM über 90 Prozent
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                100 * (1 - node_memory_MemAvailable_bytes{job="node"}
                / node_memory_MemTotal_bytes{job="node"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A > 90
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: platform-overview
        panelId: 3
        noDataState: OK
        execErrState: Error
        for: 10m
        keepFiringFor: 10m
        annotations:
          summary: Host-RAM liegt über 90 Prozent
          description: "Der RAM-Verbrauch auf {{ $labels.instance }} liegt seit mindestens 10 Minuten über 90 %."
        labels:
          severity: warning
          service: hetzner-host
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: critical-container-missing
        title: Kritischer Docker-Container fehlt
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: >-
                (
                  label_replace(label_replace(vector(1), "container", "hanmaumApp-backend", "", ""), "environment", "production", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaumApp-backend-staging", "", ""), "environment", "staging", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaumApp-keycloak", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaumApp-db", "", ""), "environment", "production", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaumApp-db-staging", "", ""), "environment", "staging", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-caddy", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-prometheus", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-loki", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-loki-healthcheck", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-grafana", "", ""), "environment", "shared", "", "")
                  or label_replace(label_replace(vector(1), "container", "hanmaum-alloy", "", ""), "environment", "shared", "", "")
                )
                unless on (container)
                label_replace(container_last_seen{name=~"/?(hanmaumApp-backend|hanmaumApp-backend-staging|hanmaumApp-keycloak|hanmaumApp-db|hanmaumApp-db-staging|hanmaum-caddy|hanmaum-prometheus|hanmaum-loki|hanmaum-loki-healthcheck|hanmaum-grafana|hanmaum-alloy)"}, "container", "$1", "name", "/?(.*)")
                and on () (up{job="containers"} == 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A > 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: platform-overview
        panelId: 5
        noDataState: OK
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: "Kritischer Container {{ $labels.container }} fehlt"
          description: "cAdvisor sieht den erwarteten Container seit mindestens 2 Minuten nicht. Prüfe Docker-Status und Container-Logs."
        labels:
          severity: critical
          service: docker
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
