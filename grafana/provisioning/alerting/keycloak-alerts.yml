apiVersion: 1

groups:
  - orgId: 1
    name: Keycloak
    folder: Observability Alerts
    interval: 1m
    rules:
      - uid: keycloak-unavailable
        title: Keycloak nicht erreichbar
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: up{job="keycloak", service="keycloak"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A < 1
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        noDataState: Alerting
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: Keycloak ist nicht erreichbar
          description: "Prometheus kann den Keycloak-Metrics-Endpunkt {{ $labels.instance }} seit mindestens 2 Minuten nicht erfolgreich abfragen."
        labels:
          severity: critical
          service: keycloak
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: keycloak-login-failure-spike
        title: Auffällig viele fehlgeschlagene Keycloak-Logins
        condition: B
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: >-
                sum by (realm) (count_over_time({service_name="keycloak"}
                |~ "(LOGIN_ERROR|CLIENT_LOGIN_ERROR|IDENTITY_PROVIDER_LOGIN_ERROR|IDENTITY_PROVIDER_FIRST_LOGIN_ERROR)" [5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A > 10
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: keycloak-auth-errors
        panelId: 1
        noDataState: OK
        execErrState: Error
        for: 1m
        keepFiringFor: 5m
        annotations:
          summary: "Auffällig viele fehlgeschlagene Logins in Realm {{ $labels.realm }}"
          description: "Keycloak hat mehr als 10 fehlgeschlagene Login-Ereignisse innerhalb von 5 Minuten protokolliert. Einzelne falsche Passwörter lösen keinen Alert aus."
        labels:
          severity: warning
          service: keycloak
          environment: shared
          team: hanmaum
        isPaused: false
        notification_settings:
          receiver: Discord Hanmaum DEV
          group_by: [grafana_folder, alertname, service, environment]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
