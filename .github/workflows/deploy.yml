name: Deploy Observability

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-observability
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy shared observability
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Push configuration to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,alloy,caddy,grafana,loki,prometheus"
          target: /opt/hanmaum-service-observability

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/hanmaum-service-observability

            test -f .env \
              || { echo "Missing /opt/hanmaum-service-observability/.env"; exit 1; }

            set -a && source .env && set +a
            mkdir -p caddy/generated
            sed "s|__GRAFANA_DOMAIN__|${GRAFANA_DOMAIN}|g" \
              caddy/grafana.caddy.template > caddy/generated/grafana.caddy
            grep -q '__GRAFANA_DOMAIN__' caddy/generated/grafana.caddy \
              && { echo "Grafana Caddy route was not rendered"; exit 1; }

            docker network create observability 2>/dev/null || true
            docker network create caddy-proxy 2>/dev/null || true

            docker compose \
              --env-file .env \
              --project-name hanmaum-observability \
              -f docker-compose.yml \
              config -q
            docker compose \
              --env-file .env \
              --project-name hanmaum-observability \
              -f docker-compose.yml \
              pull
            if ! docker compose \
              --env-file .env \
              --project-name hanmaum-observability \
              -f docker-compose.yml \
              up -d --remove-orphans; then
              docker compose \
                --env-file .env \
                --project-name hanmaum-observability \
                -f docker-compose.yml \
                ps --all || true
              docker logs hanmaum-loki --tail 200 || true
              docker inspect --format='{{json .State.Health}}' \
                hanmaum-loki-healthcheck || true
              exit 1
            fi

            # Alerting files are provisioned only when Grafana starts. Recreate
            # just Grafana so changed rules are reliably applied on every deploy.
            docker compose \
              --env-file .env \
              --project-name hanmaum-observability \
              -f docker-compose.yml \
              up -d --no-deps --force-recreate grafana

            # The shared Caddy container imports this repository's rendered
            # route through the read-only conf.d mount configured by dn-server.
            docker exec hanmaum-caddy \
              caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile

            echo "Waiting for Grafana..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hanmaum-grafana 2>/dev/null || echo missing)
              [ "$STATUS" = healthy ] && break
              echo "  attempt $i/12: $STATUS"
              sleep 10
            done
            docker inspect --format='{{.State.Health.Status}}' hanmaum-grafana | grep -q healthy \
              || { echo "Grafana health check failed"; exit 1; }

            ALERTING_ERRORS=$(docker logs hanmaum-grafana 2>&1 \
              | grep -E 'logger=provisioning\.alerting.*level=error' || true)
            if [ -n "$ALERTING_ERRORS" ]; then
              echo "$ALERTING_ERRORS"
              echo "Grafana alert provisioning failed. Verify that the contact point is named exactly: Discord Hanmaum DEV"
              exit 1
            fi

            curl -fsS "https://${GRAFANA_DOMAIN}/api/health" \
              || { echo "Grafana HTTPS smoke test failed"; exit 1; }

            echo "Observability deployment completed"
